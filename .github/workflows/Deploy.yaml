name: Deploy pres

on:
    push:
        branches:
            - main
            - master
    workflow_dispatch:

permissions:
    contents: read
    id-token: write
    pages: write

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v2

            - name: Upload GitHub Pages artifact
              uses: actions/upload-pages-artifact@v5
              with:
                  path: .
            - name: Deploy GitHub Pages site
              uses: actions/deploy-pages@v1.2.9

